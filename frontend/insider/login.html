<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osyris - Enterprise Login</title>
    <style>
        :root {
            --primary: #ffffff;
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #262626;
            --text-main: #ffffff;
            --text-muted: #a3a3a3;
            --error: #ef4444;
            --error-bg: #450a0a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg);
            color: var(--text-main);
        }

        .login-container {
            background: var(--surface);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            width: 360px;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-main);
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #525252;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #000000;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .demo-panel {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid var(--border);
        }

        .demo-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
        }

        .demo-btn {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            background: var(--bg);
        }

        .btn-employee {
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-employee:hover {
            background: #171717;
        }

        .btn-hacker {
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-hacker:hover {
            background: var(--error-bg);
        }

        #error-msg {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            padding: 10px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="logo">Osyris</div>
        <div class="subtitle">Sign in to your account</div>

        <div id="error-msg">Authentication failed. Please check your credentials.</div>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Email</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Sign In</button>
        </form>

        <div class="demo-panel">
            <div class="demo-title">Test Demo Accounts</div>
            <button class="demo-btn btn-employee" onclick="autoLogin('employee', 'password123')">Login as
                Employee</button>
            <button class="demo-btn btn-hacker" onclick="runAttackDemo()">Simulate Attack (Hacker)</button>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = new FormData(e.target);
            const res = await fetch('/login', { method: 'POST', body: data });
            const result = await res.json();

            if (result.status === 'success') {
                window.location.href = '/admin';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });

        async function autoLogin(username, password) {
            document.getElementById('username').value = username;
            document.getElementById('password').value = password;

            const data = new FormData();
            data.append('username', username);
            data.append('password', password);

            const res = await fetch('/login', { method: 'POST', body: data });
            if (res.ok) { window.location.href = '/admin'; }
        }

        async function runAttackDemo() {
            document.getElementById('username').value = 'hacker';
            document.getElementById('password').value = 'loading...';

            const data = new FormData();
            data.append('username', 'hacker');
            data.append('password', 'pwned');
            const loginRes = await fetch('/login', { method: 'POST', body: data });

            if (!loginRes.ok) return;

            document.querySelector('.btn-hacker').innerText = "Running Scripts...";

            for (let i = 0; i < 4; i++) {
                await fetch('/database');
                await new Promise(r => setTimeout(r, 100)); // ping every 100ms
                await fetch('/config');
            }

            window.location.href = '/admin';
        }
    </script>

</body>

</html>
