<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOC Dashboard | Minimalist</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="/static/styles.css" rel="stylesheet">
</head>

<body>

    <!-- MINIMALIST BREACH BANNER -->
    <div id="breach-modal" class="breach-banner">
        SYSTEM ALERT: ISOLATION ENGAGED
    </div>

    <div class="dashboard-container">
        <div class="header">
            <div class="header-left">
                <h1>Command Center <span>/ Observer</span></h1>
            </div>
            <div id="system-status-indicator" class="status-badge">Healthy</div>
        </div>

        <div class="dashboard-grid">
            <!-- Panel 1: Risk Score (Gauge) -->
            <div class="panel" style="text-align: center;">
                <div class="panel-header">Risk Score</div>
                <div class="chart-container">
                    <canvas id="riskChart"></canvas>
                    <div id="risk-number" class="gauge-center-text text-green">0</div>
                </div>
            </div>

            <!-- Panel 2: Threat Classification -->
            <div class="panel">
                <div class="panel-header">Session Profile</div>
                <div style="display: flex; flex-direction: column; justify-content: space-around; height: 100%;">
                    <div style="margin-bottom: 20px;">
                        <div class="metric-subtext">CLASSIFICATION</div>
                        <div id="attacker-type" class="metric-value text-green">Normal</div>
                    </div>

                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                        <div>
                            <div class="metric-subtext">DEVIATION</div>
                            <div id="behavior-deviation" class="metric-value" style="font-size: 20px;">Low</div>
                        </div>
                    </div>

                    <div
                        style="display: flex; justify-content: space-between; border-top: 1px solid var(--border-color); padding-top: 15px;">
                        <div>
                            <div class="metric-subtext">REQUESTS</div>
                            <div id="total-reqs" class="metric-value" style="font-size: 20px;">0</div>
                        </div>
                        <div>
                            <div class="metric-subtext">SUSPICIOUS</div>
                            <div id="suspicious-reqs" class="metric-value" style="font-size: 20px;">0</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Panel 3: Live Session Activity Feed -->
            <div class="panel span-2">
                <div class="panel-header">
                    <span>Activity Log</span>
                </div>
                <div id="activity-feed" class="activity-feed">
                    <div style="color: var(--text-muted); font-size: 13px; font-style: italic; padding: 10px;">Waiting
                        for network traffic...</div>
                </div>
            </div>

            <!-- Panel 4: Analysis / Reasons -->
            <div class="panel">
                <div class="panel-header">Insights</div>
                <ul id="risk-reasons" class="reason-list">
                    <li
                        style="color: var(--text-muted); font-size: 13px; font-style: italic; background: transparent; border: none;">
                        No anomalies detected.</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- External Dashboard UI Logic -->
    <script src="/static/dashboard.js?v=3"></script>
</body>

</html>
